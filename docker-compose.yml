version: '3.8'

services:
  # ============================================
  # INFRASTRUCTURE
  # ============================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-setup:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-setup
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --topic market-data-stocks
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --topic market-data-crypto
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --topic orders
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --topic trades
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --topic alerts
      echo 'Topics created:'
      kafka-topics --list --bootstrap-server kafka:9092
      "

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-surveillance}
      POSTGRES_USER: ${POSTGRES_USER:-surveillance_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-surveillance_pass_123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-surveillance_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # APPLICATION SERVICES
  # ============================================

  market-data-collector:
    build:
      context: ./services/market-data-collector
      dockerfile: Dockerfile
    container_name: market-data-collector
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      FINNHUB_API_KEY: ${FINNHUB_API_KEY}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_STOCKS_TOPIC: market-data-stocks
      KAFKA_CRYPTO_TOPIC: market-data-crypto
      WATCH_SYMBOLS: ${WATCH_SYMBOLS:-AAPL,TSLA,JPM,MSFT,GOOGL}
      WATCH_CRYPTO_SYMBOLS: ${WATCH_CRYPTO_SYMBOLS:-BINANCE:BTCUSDT,BINANCE:ETHUSDT,BINANCE:XRPUSDT}
    restart: unless-stopped

  order-generator:
    build:
      context: ./services/order-generator
      dockerfile: Dockerfile
    container_name: order-generator
    depends_on:
      kafka:
        condition: service_healthy
      market-data-collector:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_STOCKS_TOPIC: market-data-stocks
      KAFKA_CRYPTO_TOPIC: market-data-crypto
      KAFKA_ORDERS_TOPIC: orders
      KAFKA_TRADES_TOPIC: trades
      LOOP_TICK_SECONDS: "1.0"
    restart: unless-stopped

  # ============================================
  # LAKEHOUSE
  # ============================================

  bronze-writer:
    build:
      context: ./services/lakehouse-writer
      dockerfile: Dockerfile
    container_name: bronze-writer
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPICS: orders,trades,market-data-stocks,market-data-crypto,alerts
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: surveillance-lake
      BATCH_SECONDS: "60"
    restart: unless-stopped

  silver-gold-writer:
    build:
      context: ./services/lakehouse-writer
      dockerfile: Dockerfile
    image: lakehouse-writer:latest
    container_name: silver-gold-writer
    command: ["python", "silver_gold_writer.py"]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: surveillance-lake
      INTERVAL_SECONDS: "300"
      LOOKBACK_HOURS: "24"
    restart: unless-stopped

  # ============================================
  # DATA LAKE
  # ============================================

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  minio-setup:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Configuring MinIO client...'
      mc alias set lake http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY}
      echo 'Creating surveillance-lake bucket...'
      mc mb --ignore-existing lake/surveillance-lake
      echo 'Creating bronze/ silver/ gold/ directory placeholders...'
      touch /tmp/.keep
      mc cp /tmp/.keep lake/surveillance-lake/bronze/.keep
      mc cp /tmp/.keep lake/surveillance-lake/silver/.keep
      mc cp /tmp/.keep lake/surveillance-lake/gold/.keep
      echo 'Setup complete. Bucket contents:'
      mc ls lake/surveillance-lake
      "

  # ============================================
  # STREAM PROCESSING
  # ============================================

  flink-jobmanager:
    build:
      context: ./services/flink-processor
      dockerfile: Dockerfile
    image: flink-pyflink:1.18
    container_name: flink-jobmanager
    entrypoint: ["/opt/flink/jobs/setup.sh"]
    command: jobmanager
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.bind-address: 0.0.0.0
    volumes:
      - ./services/flink-processor:/opt/flink/jobs
    restart: unless-stopped

  flink-taskmanager:
    build:
      context: ./services/flink-processor
      dockerfile: Dockerfile
    image: flink-pyflink:1.18
    container_name: flink-taskmanager
    entrypoint: ["/opt/flink/jobs/setup.sh"]
    command: taskmanager
    depends_on:
      kafka:
        condition: service_healthy
      flink-jobmanager:
        condition: service_started
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    volumes:
      - ./services/flink-processor:/opt/flink/jobs
    restart: unless-stopped

  # ============================================
  # DASHBOARD
  # ============================================

  dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
    container_name: dashboard
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_ALERTS_TOPIC: alerts
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: surveillance-lake
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
